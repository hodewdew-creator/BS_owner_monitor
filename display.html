<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>BS 보호자 모니터 (내부용)</title>
  <style>
    :root{
      --bg:#0b1220; --fg:#ffffff; --muted:#9ca3af;
      --card:#111827cc; --border:#1f2937; --blur:8px;
      --brand:#2b5fa3;
      --s-red:#dc2626; --s-amber:#d97706; --s-sky:#0284c7; --s-green:#111827; --s-gray:#64748b;
    }
    html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto}
    .topbar{
      position:fixed; inset:0 0 auto 0; z-index:10;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:10px 14px; background:var(--card); border-bottom:1px solid var(--border); backdrop-filter:blur(var(--blur));
      font-size:12px;
    }
    .brandwrap{display:flex; align-items:center; gap:10px; font-weight:900}
    .logo{width:22px;height:22px;border-radius:5px;object-fit:cover}
    .brand{letter-spacing:.2px}
    .right{display:flex;align-items:center;gap:8px}
    .whoami{opacity:.8}
    .tbtn{cursor:pointer;border:0;border-radius:8px;padding:6px 8px;background:#1f2937;color:#fff;border:1px solid #374151}
    .tbtn.ok{background:var(--brand);border-color:transparent}
    .pill{border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;background:#1f2937;border:1px solid #374151}
    .pill.ok{background:#111827}.pill.err{background:#dc2626}.pill.warn{background:#f59e0b;color:#111}

    .wrap{min-height:100%;padding:64px 14px 20px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
    .card{
      background:var(--card); border:1px solid var(--border); border-radius:16px;
      padding:14px; display:flex; flex-direction:column; gap:10px;
    }
    /* 콜요청 = 고정 테두리(무한 점멸 제거) */
    .card.call{outline:4px solid rgba(220,38,38,.6); outline-offset:-4px; animation:none;}

    @keyframes call{0%,100%{outline-color:rgba(220,38,38,.2)}50%{outline-color:rgba(220,38,38,.8)}}

    /* 🔔 상담/면회/메모 신규시 5~6초 붉은 테두리 */
    .card.flash5{
      outline:4px solid rgba(220,38,38,.8);
      outline-offset:-4px;
    }

    .head{display:flex; align-items:center; justify-content:space-between; gap:10px}
    .name{font-weight:900; font-size:18px; word-break:keep-all}
    .badge{
      border-radius:999px; padding:6px 10px; font-weight:900; font-size:12px; white-space:nowrap;
      border:1px solid #374151; background:#1f2937; color:#fff;
    }
    .b-상담대기중{background:var(--s-red); border-color:transparent}
    .b-면회대기중{background:var(--s-red); border-color:transparent; color:#fff;}
    .b-원내,.b-라운지☕{background:#FFD9DF; color:#111; border-color:transparent}
    .b-외출{background:#C084FC; color:#111; border-color:transparent}
    .b-라운지콜완료,.b-외출콜완료{background:#34D399; border-color:transparent}
    .b-귀가,.b-수납후미귀가{background:#9CA3AF; color:#111; border-color:transparent}
    .b-1진료실,.b-2진료실,.b-3진료실,.b-4진료실{ background:#2b5fa3; color:#fff; border-color:transparent; }

    .memo{
      display:none; font-size:14px; line-height:1.25; font-weight:800;
      color:#111; background:#FFF176; border:1px solid #f59e0b;
      padding:5px 8px; border-radius:10px; display:inline-block; align-self:flex-start;
      max-width:100%; overflow-wrap:anywhere;
    }
    .memo.show{ display:inline-block; }
    .meta{font-size:12px; color:var(--muted)}
    .actions{display:flex; gap:8px; flex-wrap:wrap}
    .btn{cursor:pointer; border:0; border-radius:10px; padding:8px 12px; font-size:13px; font-weight:700;
      background:#1f2937; color:#fff; border:1px solid #374151;}
    .btn.ghost{background:transparent; color:#9ca3af}

    .errbox{display:none;background:#fee2e2;color:#7f1d1d;border:2px solid #ef4444;border-radius:12px;padding:10px 12px;margin:8px 0;font-weight:700;white-space:pre-wrap}
    .errbox.show{display:block}

    .overlay{position:fixed; inset:0; z-index:50; display:none; align-items:center; justify-content:center; background:rgba(2,6,23,.65); backdrop-filter:blur(4px)}
    .overlay.show{display:flex}
    .modal{width:min(720px,92vw); background:#fff; color:#0f172a; border-radius:16px; border:3px solid #ef4444; box-shadow:0 20px 60px rgba(0,0,0,.35); padding:22px; text-align:center; animation:flash .9s ease-in-out 1}
    @keyframes flash{0%{transform:scale(.98)}100%{transform:scale(1)}}
    .modal h2{margin:0 0 6px; font-size:24px; font-weight:600}
    .who{font-size:40px; font-weight:900; margin:6px 0 2px}
    .hint{font-size:13px; color:#64748b; margin-bottom:14px}
    .m-actions{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:8px}
    .m-actions .btn{padding:12px 16px; font-size:15px}
    .m-close{position:absolute; top:10px; right:12px; background:transparent; color:#fff; border:0; font-size:24px; cursor:pointer}

    .emoji{font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji","Twemoji Mozilla","Segoe UI Symbol",sans-serif; font-weight:400; line-height:1; vertical-align:-2px;}

    .modal h2{font-weight:800; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; text-rendering:optimizeLegibility;}
    .modal{will-change:transform; transform:translateZ(0);}
    .btn.ghost{ background:#1f2937; border:1px solid #4b5563; opacity:.9 }
    .btn.ghost:active{ transform: translateY(1px); }

    .card.pending-ack {
  outline: 4px solid rgba(220,38,38,.8);
  outline-offset: -4px;
  animation: call 1s infinite;
}

  </style>
</head>
<body>
  <div class="topbar">
    <div class="brandwrap">
      <img class="logo" src="image-512.png" alt="BS Logo" />
      <div class="brand">BS 보호자 모니터 (내부용)</div>
    </div>
    <div class="right">
      <span id="whoami" class="whoami"></span>
      <button id="loginBtn" class="tbtn ok">Google 로그인</button>
      <button id="logoutBtn" class="tbtn" style="display:none">로그아웃</button>
      <button id="soundBtn" class="tbtn" title="소리: 켬" aria-pressed="true">🔊</button>
      <button id="notifyBtn" class="tbtn" title="시스템 알림: 켬" aria-pressed="true">🔔</button>
      <span id="conn" class="pill warn">연결 확인 중…</span>
    </div>
  </div>

  <div class="wrap">
    <div id="err" class="errbox"></div>
    <div id="grid" class="grid"></div>
  </div>

  <audio id="ding" src="ding.mp3" preload="auto"></audio>

  <div id="ackOverlay" class="overlay" aria-hidden="true">
    <button id="ackClose" class="m-close" title="닫기">✕</button>
    <div class="modal" role="dialog" aria-modal="true">
     <h2><span class="emoji">📣</span> 대기 환자 확인</h2>
      <div id="ackWho" class="who"></div>
      <div class="hint">“확인”을 누르면 리셉에 ‘대기중 전달완료’로 안내됩니다. ("보류"를 누르면 이 컴퓨터에서의 팝업창만 사라집니다.) </div>
      <div class="m-actions">
        <button id="ackHold" class="btn ghost">보류</button>
        <button id="ackConfirm" class="btn">확인</button>
      </div>
    </div>
  </div>

  <script type="module">
    const grid=document.getElementById('grid');
    const conn=document.getElementById('conn');
    const ding=document.getElementById('ding');
    const errBox=document.getElementById('err');
    const whoami=document.getElementById('whoami');
    const loginBtn=document.getElementById('loginBtn');
    const logoutBtn=document.getElementById('logoutBtn');

    // ===== 소리/시스템 알림 토글 & 통합 울림 유틸 =====
const soundBtn = document.getElementById('soundBtn');
const notifyBtn = document.getElementById('notifyBtn');

function isHidden(){ return document.hidden === true; }
function isSoundOn(){
  try{ return localStorage.getItem('soundOn') !== '0'; }catch(e){ return true; } // 기본: 켬
}
function isNotifyOn(){
  try{ return localStorage.getItem('notifyOn') !== '0'; }catch(e){ return true; } // 기본: 켬
}
function setSound(on){
  try{ localStorage.setItem('soundOn', on ? '1' : '0'); }catch(e){}
  updateSoundUI();
}
function setNotify(on){
  try{ localStorage.setItem('notifyOn', on ? '1' : '0'); }catch(e){}
  updateNotifyUI();
}
function updateSoundUI(){
  const on = isSoundOn();
  if(!soundBtn) return;
  soundBtn.textContent = on ? '🔊' : '🔇';
  soundBtn.title = on ? '소리: 켬' : '소리: 끔';
  soundBtn.setAttribute('aria-pressed', on ? 'true' : 'false');
}
function updateNotifyUI(){
  const on = isNotifyOn();
  if(!notifyBtn) return;
  notifyBtn.textContent = on ? '🔔' : '🔕';
  let title = on ? '시스템 알림: 켬' : '시스템 알림: 끔';
  if(on && canSystemNotify() && Notification.permission === 'denied'){
    title = '시스템 알림: 차단됨';
  }
  notifyBtn.title = title;
  notifyBtn.setAttribute('aria-pressed', on ? 'true' : 'false');
}

function canSystemNotify(){ return 'Notification' in window; }
async function ensureNotifyPermissionIfNeeded(){
  if(!canSystemNotify()) return false;
  if(Notification.permission === 'granted') return true;
  if(Notification.permission === 'denied') return false;
  const res = await Notification.requestPermission();
  return res === 'granted';
}

/** 소리/알림 통합 울림
 * - 소리 켬(🔊): ding.mp3 재생
 * - 시스템 알림 켬(🔔) + 숨김/최소화: 윈도우 시스템 알림
 */
async function ringWithFallback(title, body, tag='bs-owner-monitor'){
  if(isSoundOn()){
    try{ ding.currentTime = 0; await ding.play(); }catch(e){ /* 브라우저 정책에 따라 무시될 수 있음 */ }
  }

  if(isNotifyOn() && isHidden() && canSystemNotify()){
    if(Notification.permission === 'default'){
      return; // 권한 요청은 사용자가 🔔를 켤 때만 수행
    }
    if(Notification.permission === 'granted'){
      new Notification(title, {
        body, tag, renotify:true, requireInteraction:true, timestamp:Date.now(), silent:false
      });
    }
  }
}

if (soundBtn){
  soundBtn.onclick = ()=>{
    setSound(!isSoundOn());
  };
  updateSoundUI();
}

if (notifyBtn){
  notifyBtn.onclick = async ()=>{
    const next = !isNotifyOn();
    setNotify(next);
    if(next && canSystemNotify() && Notification.permission !== 'granted'){
      await ensureNotifyPermissionIfNeeded();
    }
    updateNotifyUI();
  };
  updateNotifyUI();
}

    // ---- Device name resolve & persist ----
    function resolveDeviceName(){
      try{
        const KEY='deviceName';
        let n=localStorage.getItem(KEY);
        if(!n){
          const guess=(navigator.userAgentData?.platform||navigator.platform||'').replace(/\s+/g,'-');
          n=prompt('이 디스플레이 이름을 입력하세요 (예: 대기실-모니터)', guess || '');
          if(n) localStorage.setItem(KEY, n);
        }
        return n || '디스플레이';
      }catch(e){ return '디스플레이'; }
    }
    const DEVICE_NAME = resolveDeviceName();

    // 콜 카운트다운 타이머 보관
    if (!window._pendingCallTimers) window._pendingCallTimers = new Map();

    const showErr=(m)=>{console.error(m);errBox.textContent=m;errBox.classList.add('show')};
    const hideErr=()=>errBox.classList.remove('show');

    const relTime=(ts)=>{if(!ts)return "";const s=Math.floor((Date.now()-ts)/1000);
      if(s<60)return`${s}초 전`;const m=Math.floor(s/60);if(m<60)return`${m}분 전`;
      const h=Math.floor(m/60);if(h<24)return`${h}시간 전`;const d=Math.floor(h/24);return`${d}일 전`};
    const formatKTime=(ts)=>{if(!ts)return"";const d=new Date(ts);let h=d.getHours();const m=String(d.getMinutes()).padStart(2,"0");const ap=h<12?"오전":"오후";h=h%12||12;return`${ap} ${h}:${m}`};

    setInterval(()=>{document.querySelectorAll('[data-updated]').forEach(el=>{
      const ts=Number(el.dataset.updated||0);
      el.textContent = ts ? `업데이트: ${relTime(ts)} (${formatKTime(ts)})` : '';
    });},30_000);

    const isClinic=(s)=>/^[1-4]\s?진료실$/.test((s||'').trim());
    const badgeClass=(s)=>({
      '상담대기중':'b-상담대기중','면회대기중':'b-면회대기중',
      '원내':'b-원내','라운지☕':'b-라운지☕','외출':'b-외출',
      '라운지콜완료':'b-라운지콜완료','외출콜완료':'b-외출콜완료',
      '귀가':'b-귀가','수납후미귀가':'b-수납후미귀가',
      '1 진료실':'b-1진료실','2 진료실':'b-2진료실','3 진료실':'b-3진료실','4 진료실':'b-4진료실',
      '1진료실':'b-1진료실','2진료실':'b-2진료실','3진료실':'b-3진료실','4진료실':'b-4진료실'
    }[s]||'');

    let auth, provider, db;

    const ackOverlay = document.getElementById('ackOverlay');
    const ackWho     = document.getElementById('ackWho');
    const ackConfirm = document.getElementById('ackConfirm');
    const ackClose   = document.getElementById('ackClose');
    const ackHold    = document.getElementById('ackHold');

    const holdKey = (id, reqAt)=> `ackHold:${id}:${Number(reqAt||0)}`;

    let modalTargetId = null;
    let modalTargetReqAt = 0;
    const lastSeenReqAt = new Map();

    function openAck(name, id, reqAt){
      modalTargetId = id;
      modalTargetReqAt = Number(reqAt||0);
      ackWho.textContent = name;
      ackOverlay.classList.add('show');
      ackOverlay.setAttribute('aria-hidden','false');
      ringWithFallback('대기 환자 확인', `${name} 확인 필요`, 'ack-popup');
    }
    function closeAck(){
      ackOverlay.classList.remove('show');
      ackOverlay.setAttribute('aria-hidden','true');
    }

    /* 🔔 5~6초 붉은 테두리 유지 (상담/면회/메모 신규) */
    function flashSolidById(id, ms=5600){
      const el = document.querySelector(`.card[data-id="${id}"]`);
      if(!el) return;
      el.classList.add('flash5');
      setTimeout(()=> el.classList.remove('flash5'), ms);
    }

    try{
      const { initializeApp }=await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const { getFirestore, collection, onSnapshot, query, orderBy, runTransaction, doc }=await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      const { getAuth, setPersistence, browserLocalPersistence, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut }=await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js");

      const firebaseConfig={apiKey:"AIzaSyDxhY_FjNOp_F0g-DXypaoN7RRjFqNIoG4",authDomain:"bs-owner-monitor.firebaseapp.com",projectId:"bs-owner-monitor"};
      const app=initializeApp(firebaseConfig);
      db=getFirestore(app);

      auth=getAuth(app);
      await setPersistence(auth, browserLocalPersistence).catch(e=>showErr('Persistence 설정 실패: '+e.message));
      provider=new GoogleAuthProvider();
      getRedirectResult(auth).catch(e=>showErr('리다이렉트 결과 오류: '+e.message));

      async function doLogin(){
        try{ await signInWithPopup(auth, provider); }
        catch(e){
          if(e?.code==='auth/operation-not-supported-in-this-environment' || String(e?.message||'').includes('popup')){
            showErr('팝업 로그인 불가 → 리다이렉트 로그인으로 진행합니다.');
            await signInWithRedirect(auth, provider);
            return;
          }
          showErr('로그인 실패: '+(e.code||'')+' '+e.message);
        }
      }
      loginBtn.onclick=doLogin;
      logoutBtn.onclick=async()=>{ try{ await signOut(auth); }catch(e){ showErr('로그아웃 실패: '+e.message);} };
      onAuthStateChanged(auth,(user)=>{
        if(user){ whoami.textContent = user.email ? `${user.email} · ${DEVICE_NAME}` : DEVICE_NAME; logoutBtn.style.display=''; loginBtn.style.display='none'; }
        else{ whoami.textContent=''; logoutBtn.style.display='none'; loginBtn.style.display=''; }
      });

      onSnapshot(query(collection(db,"cases"),orderBy("createdAt","desc")),(snap)=>{
        hideErr();

        const docs = snap.docs.map(x=>({ id:x.id, ...x.data() }));
        const byId = new Map(docs.map(d=>[d.id,d]));

        // 다른 기기에서 확인되면 현재 팝업 닫기
        if (modalTargetId) {
          const fresh = byId.get(modalTargetId);
          if (fresh) {
            const reqAt = Number(fresh.ackRequestedAt||0);
            if (fresh.ackConfirmed === true) {
              lastSeenReqAt.set(modalTargetId, reqAt);
              closeAck();
              modalTargetId = null;
            }
          }
        }

// ✅ 새 대기 팝업 후보 찾기
//  - 상담/면회 상태
//  - ackRequestedAt 이 있음
//  - 아직 한 번도 "완전히 해결된 적 없는" 요청만 (ackResolvedAt < ackRequestedAt 인 경우만)
//  - 이 디스플레이에서 아직 본 적 없는 reqAt (lastSeenReqAt 보다 큼)
//  - 이 디스플레이에서 "보류"로 표시하지 않은 경우
if (!modalTargetId) {
  const cands = docs.filter(d => {
    const s = d.location || '';
    const reqAt = Number(d.ackRequestedAt || 0);
    const resolvedAt = Number(d.ackResolvedAt || 0);
    const seen = lastSeenReqAt.get(d.id) || 0;

    const held = (function () {
      try {
        return localStorage.getItem(holdKey(d.id, reqAt)) === '1';
      } catch (e) {
        return false;
      }
    })();

    const isWaitState =
      s === '상담대기중' || s === '면회대기중';

    // 🔴 "아직 전달이 안 된 요청"만 팝업 후보로 본다.
    //   → 누군가 한번이라도 '확인'을 누른 순간 ackResolvedAt 이 찍히고,
    //      그 시점 이후에는 이 요청은 다시 팝업 대상이 되지 않음.
    const isUnresolved =
      reqAt > 0 && (resolvedAt === 0 || resolvedAt < reqAt);

    return (
      isWaitState &&
      isUnresolved &&          // ← 이 줄이 핵심!
      !d.ackConfirmed &&       // (리셉션에서 5초 동안 true였다가 false로 돌아가더라도,
                               //  ackResolvedAt 이 남아있으면 다시 후보로 안 들어옴)
      reqAt > seen &&
      !held
    );
  });

  if (cands.length) {
    // 가장 오래된 요청부터 처리
    cands.sort((a, b) => (a.ackRequestedAt || 0) - (b.ackRequestedAt || 0));
    const p = cands[0];
    const nm = (p.patientName || p.guardianName)
      ? (p.patientName && p.guardianName
          ? `${p.patientName}(${p.guardianName})`
          : (p.patientName || p.guardianName))
      : p.id;

    openAck(nm, p.id, p.ackRequestedAt);
  }
}


        // 카드 렌더 및 알림 트리거 계산 준비
        const frag=document.createDocumentFragment();
        if(!window._prevState){ window._prevState=new Map(); window._prevHasMemo=new Map(); window._lastCall=new Set(); window._inited=false; }
        const prevState=window._prevState, prevHasMemo=window._prevHasMemo, lastCall=window._lastCall, inited=window._inited;

        // 정렬 우선순위
        docs.sort((a,b)=>{
          const rank=(d)=>{
            const s=d.location||'';
            if(s==="상담대기중" || s==="면회대기중") return 0;
            if(/^[1-4]\s?진료실$/.test(s)) return 1;
            if(s==="귀가"||s==="수납후미귀가") return 3;
            return 2;
          };
          const oa=rank(a), ob=rank(b);
          if(oa!==ob) return oa-ob;
          return (b.createdAt||0)-(a.createdAt||0);
        });

        const toFlashSolid = []; // ✅ 이번 프레임에서 5~6초 붉은 테두리 줄 대상
        docs.forEach(d=>{
          let shouldDing=false;
          const curState=d.location||"";
          const curHasMemo=!!((d.memo||"").trim());

          if(inited){
            if(d.callRequested && !lastCall.has(d.id)) shouldDing=true;                   // 콜 새로 켜짐
            const ps=prevState.get(d.id);
            if((curState==="상담대기중"||curState==="면회대기중") && curState!==ps) shouldDing=true; // 상담/면회 진입
            const pm=prevHasMemo.get(d.id);
            if(curHasMemo && !pm) shouldDing=true;                                       // 메모 신규
          }

          // 콜요청 집합 갱신
          if(d.callRequested) lastCall.add(d.id); else lastCall.delete(d.id);

          // 🔔 소리 트리거가 났고, "콜 새로 켜짐"이 아닌 경우 → 5~6초 붉은 테두리
          const isNewCall = (d.callRequested && !inited && false) || (d.callRequested && !prevState.has(d.id)) ? false
                            : (d.callRequested && !window._lastCall.has(d.id)); // 보호적 계산
          // 위 한 줄은 방어적이지만, 실제로는 아래처럼 간단히:
          // const isNewCall = (d.callRequested && !window._lastCall.has(d.id));

          if(shouldDing){
            // 새 콜이 아니라면(= 상담/면회 진입 또는 메모 신규), 잠시 붉은 테두리
            const newCallNow = (d.callRequested && !window._lastCall.has(d.id));
            if(!newCallNow){
              toFlashSolid.push(d.id);
            }
            const nm = (d.patientName||d.guardianName)
  ? (d.patientName && d.guardianName ? `${d.patientName}(${d.guardianName})` : (d.patientName||d.guardianName))
  : d.id;
const state = (d.location||'상태변경');
// 내가 보낸 콜이면(같은 디스플레이) 내 화면에선 중복 딩 생략
const initiatedByMe = d.callRequested && d.callRequestedBy === DEVICE_NAME;
if (!initiatedByMe) {
  ringWithFallback('상태 알림', `${nm}: ${state}`, 'case-update');
}

          }

          prevState.set(d.id,curState);
          prevHasMemo.set(d.id,curHasMemo);

// === 카드 DOM ===
const card = document.createElement('div');
card.className = 'card';
card.dataset.id = d.id; // 카드 식별용

// 콜요청: 고정 테두리 유지
if (d.callRequested) {
  card.classList.add('call');
}

// 🔴 상담/면회 대기 + 아직 유효한 전달완료가 없는 경우 = 점멸 유지
const isWaitState =
  (curState === "상담대기중" || curState === "면회대기중");

const reqAt = Number(d.ackRequestedAt || 0);
const resolvedAt = Number(d.ackResolvedAt || 0);

// "전달 안 된 상태"라고 보는 조건:
// 1) 상담/면회 상태이고
// 2) 전달요청 시각(ackRequestedAt)이 있고
// 3) 그 이후를 덮는 ackResolvedAt이 없다
//
// → 한 번이라도 '확인' 눌러서 ackResolvedAt >= ackRequestedAt 이면,
//   이후 리셋(ackConfirmed:false)되더라도 다시 점멸하지 않음.
const needsAck =
  isWaitState &&
  reqAt > 0 &&
  (resolvedAt === 0 || resolvedAt < reqAt);

if (needsAck) {
  card.classList.add('pending-ack');
}


          const head=document.createElement('div');head.className='head';
          const name=document.createElement('div');name.className='name';
          name.textContent=(d.patientName||d.guardianName)
            ?(d.patientName&&d.guardianName?`${d.patientName}(${d.guardianName})`:(d.patientName||d.guardianName))
            :d.id;
          const badge=document.createElement('span');badge.className='badge '+(badgeClass(curState)||''); badge.textContent=curState||'상태없음';
          head.appendChild(name); head.appendChild(badge);
          card.appendChild(head);

          const memoTxt=(d.memo||"").trim();
          if(memoTxt){
            const memo=document.createElement('div');memo.className='memo show';
            memo.textContent=memoTxt.length>140?memoTxt.slice(0,137)+'…':memoTxt;
            card.appendChild(memo);
          }

          const meta=document.createElement('div');meta.className='meta';
          meta.dataset.updated=d.updatedAt||0;
          meta.textContent=d.updatedAt?`업데이트: ${relTime(d.updatedAt)} (${formatKTime(d.updatedAt)})`:'';
          card.appendChild(meta);

          const actions=document.createElement('div');actions.className='actions';
          const callBtn=document.createElement('button');callBtn.className='btn';callBtn.textContent='📣 콜요청하기';
          const cancelBtn=document.createElement('button');cancelBtn.className='btn ghost';cancelBtn.textContent='콜요청취소';

// 📣 콜요청: 3→2→1 카운트다운 후 전송
callBtn.onclick = () => requireLoginThen(() => {
  // 중복 클릭/중복 타이머 방지
  if (window._pendingCallTimers.has(d.id)) return;

  // 1) 즉시 짧게 딩(클릭감) — 내 화면만
  ringWithFallback('콜 요청 카운트다운', '3초 후 리셉으로 전달됩니다.');

  // 2) 버튼 상태 진입
  const originalText = callBtn.textContent;
  let sec = 3;
  callBtn.disabled = true;
  callBtn.textContent = `⏳ ${sec}초 후 전송`;

  // 3) 1초마다 카운트다운
  const t = setInterval(() => {
    sec--;
    if (sec > 0) {
      callBtn.textContent = `⏳ ${sec}초 후 전송`;
    } else {
      clearInterval(t);
      window._pendingCallTimers.delete(d.id);

      callBtn.textContent = '전송 중...';
      // 4) 실제 DB 전송 (누가 보냈는지 기록)
      updateCase(d.id, {
        callRequested: true,
        callRequestedAt: Date.now(),
        callRequestedBy: DEVICE_NAME
      }).then(() => {
        callBtn.textContent = '✅ 전송 완료';
        setTimeout(() => {
          callBtn.textContent = originalText;
          callBtn.disabled = false;
        }, 1200);
      }).catch((e) => {
        callBtn.textContent = '❌ 실패 (다시 시도)';
        setTimeout(() => {
          callBtn.textContent = originalText;
          callBtn.disabled = false;
        }, 1500);
      });
    }
  }, 1000);

  // 타이머 보관 (취소 버튼이 중간에 끊을 수 있게)
  window._pendingCallTimers.set(d.id, { timer: t, originalText });
});

// 🧹 콜요청취소: (1) 카운트다운 중이면 타이머만 취소/원복, (2) 이미 전송된 뒤면 DB에서 callRequested 해제
cancelBtn.onclick = () => requireLoginThen(() => {
  const pending = window._pendingCallTimers.get(d.id);
  if (pending) {
    // 카운트다운 단계에서의 취소 → 실제 전송 막기
    clearInterval(pending.timer);
    window._pendingCallTimers.delete(d.id);
    callBtn.textContent = pending.originalText;
    callBtn.disabled = false;
    // 필요하면 여기서도 짧은 취소 딩
    // ringWithFallback('콜 요청 취소됨', '전송되지 않았습니다.');
    return;
  }
  // 이미 전송된 뒤의 일반 취소
  updateCase(d.id, { callRequested: false });
});

          actions.appendChild(callBtn);actions.appendChild(cancelBtn);
          card.appendChild(actions);

          frag.appendChild(card);
        });

        const gridEl=document.getElementById('grid');
        gridEl.innerHTML='';
        gridEl.appendChild(frag);

        // ✅ 렌더 완료 후, 상담/면회/메모 신규였던 카드들만 5~6초 붉은 테두리
        requestAnimationFrame(()=>{
          toFlashSolid.forEach(id => flashSolidById(id));
        });

        window._inited=true;
        conn.textContent='연결됨'; conn.className='pill ok';
      },(e)=>{conn.textContent='연결 오류';conn.className='pill err';showErr('리스트 구독 실패: '+e.message);});

      function requireLoginThen(fn){
        if(auth.currentUser){ fn(); return; }
        showErr('이 작업은 로그인 후 가능합니다. 로그인 창을 열게요.');
        doLogin();
      }

      async function updateCase(id,data){
        try{
          await runTransaction(db,async(tx)=>{
            const ref=doc(db,"cases",id);
            const snap=await tx.get(ref);
            const prev=snap.exists()?snap.data():{version:0};
            tx.set(ref,{...data,updatedAt:Date.now(),version:(prev.version||0)+1},{merge:true});
          });
        }catch(e){ throw e; }
      }

      // ▶ 팝업 버튼: ‘확인’은 전송, ‘보류/X’는 단순 닫기
     async function confirmAckAndClose(){
        if(!modalTargetId) return;
        try{
   await updateCase(modalTargetId,{ ackConfirmed:true, ackDevice: DEVICE_NAME, ackAt: Date.now(), ackResolvedAt: Date.now() });

          lastSeenReqAt.set(modalTargetId, modalTargetReqAt||Date.now());
          closeAck();
          modalTargetId=null;
        }catch(e){
          showErr('확인 전송 실패: '+(e.code||'')+' '+e.message);
        }
      }
      // 확인 = 전송
      ackConfirm.onclick = ()=> requireLoginThen(confirmAckAndClose);
      // 보류 = 단순 닫기
      ackHold.onclick    = ()=>{
        try{
          if(modalTargetId && modalTargetReqAt){
            localStorage.setItem(holdKey(modalTargetId, modalTargetReqAt), '1');
          }
        }catch(e){}
        closeAck();
        modalTargetId=null;
      };
      // X = 보류와 동일
      ackClose.onclick   = ()=>{
        try{
          if(modalTargetId && modalTargetReqAt){
            localStorage.setItem(holdKey(modalTargetId, modalTargetReqAt), '1');
          }
        }catch(e){}
        closeAck();
        modalTargetId=null;
      };

    }catch(e){
      conn.textContent='초기화 오류';conn.className='pill err';
      showErr('Firebase 초기화 실패: '+(e.message||e));
    }
  </script>
</body>
</html>
